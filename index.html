<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Brief — All Issues</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f4f0; font-family: 'Lora', serif; display: flex; justify-content: center; padding: 48px 24px; }
    .page { background: #fffef9; max-width: 640px; width: 100%; padding: 40px 48px; border: 0.5px solid rgba(26,25,23,0.22); border-radius: 4px; }
    header { border-top: 4px solid #b5451b; padding-top: 14px; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
    .wordmark { display: flex; align-items: baseline; gap: 8px; }
    .wm-ai { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #b5451b; line-height: 1; }
    .wm-brief { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #b8b5b0; line-height: 1; }
    .wm-sub { font-family: 'Lora', serif; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #4a4845; }
    h1 { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #b5451b; margin-bottom: 20px; }
    .issue-list { list-style: none; }
    .issue-item { border-bottom: 0.5px solid rgba(26,25,23,0.12); }
    .issue-item:first-child { border-top: 0.5px solid rgba(26,25,23,0.12); }
    .issue-link { display: flex; align-items: baseline; gap: 20px; padding: 14px 0; text-decoration: none; color: inherit; }
    .issue-link:hover .issue-headline { color: #b5451b; }
    .issue-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #888580; white-space: nowrap; min-width: 90px; }
    .issue-headline { font-family: 'Lora', serif; font-size: 14px; font-weight: 600; color: #1a1917; line-height: 1.4; }
    .empty { font-family: 'Lora', serif; font-size: 13px; color: #888580; padding: 20px 0; }
  </style>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.app.notifySuccess();
    });
  </script>
</head>
<body>
<div class="page">
  <header>
    <div class="wordmark">
      <span class="wm-ai">AI</span>
      <span class="wm-brief">Brief</span>
    </div>
    <span class="wm-sub">All Issues</span>
  </header>
  <h1>Archive</h1>
  <ul class="issue-list">
    <li class="issue-item">
      <a class="issue-link" href="issues/2026-03-24.html">

        <span class="issue-headline">Anthropic ships computer use, LiteLLM gets backdoored, and the enterprise agent land-grab accelerates</span>

</html>
