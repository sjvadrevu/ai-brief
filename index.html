<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai">
  <title>AI Brief</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f4f0; font-family: 'Lora', serif; display: flex; justify-content: center; padding: 48px 24px; }
    .page { background: #fffef9; max-width: 860px; width: 100%; border: 0.5px solid rgba(26,25,23,0.22); border-radius: 4px; overflow: hidden; }

    /* Header */
    header { border-top: 4px solid #b5451b; padding: 16px 40px 16px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(26,25,23,0.1); }
    .wordmark { display: flex; align-items: baseline; gap: 8px; }
    .wm-ai { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #b5451b; line-height: 1; }
    .wm-brief { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #b8b5b0; line-height: 1; }

    /* Search */
    .search-wrap { display: flex; align-items: center; gap: 6px; }
    .search-wrap svg { flex-shrink: 0; opacity: 0.35; }
    .search-input { width: 130px; padding: 2px 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; border: none; border-bottom: 0.5px solid rgba(26,25,23,0.2); background: transparent; color: #1a1917; outline: none; }
    .search-input:focus { border-bottom-color: #b5451b; }

    /* Tabs */
    .tabs-bar { padding: 0 40px; border-bottom: 0.5px solid rgba(26,25,23,0.12); }
    .tabs { display: flex; gap: 0; }
    .tab { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #888580; padding: 10px 20px 10px 0; cursor: pointer; border: none; border-bottom: 2px solid transparent; margin-bottom: -0.5px; background: none; }
    .tab.active { color: #b5451b; border-bottom-color: #b5451b; }
    .tab:hover:not(.active) { color: #1a1917; }

    /* Body — two column */
    .body { display: flex; }

    /* Issue list — left */
    .main { flex: 1; padding: 32px 40px; min-width: 0; }

    /* Mobile */
    @media (max-width: 600px) {
      body { padding: 0; }
      .page { border-radius: 0; border-left: none; border-right: none; max-width: 100%; }
      header { padding: 14px 20px; }
      .wm-ai, .wm-brief { font-size: 32px; }
      .tabs-bar { padding: 0 20px; }
      .body { flex-direction: column-reverse; }
      .main { padding: 24px 20px; }
      .sidebar { display: none; }
    }
    .month-group { margin-bottom: 32px; }
    .month-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: #b5451b; margin-bottom: 10px; }
    .issue-list { list-style: none; }
    .issue-item { border-bottom: 0.5px solid rgba(26,25,23,0.08); }
    .issue-item:first-child { border-top: 0.5px solid rgba(26,25,23,0.08); }
    .issue-link { display: flex; align-items: baseline; gap: 20px; padding: 12px 0; text-decoration: none; color: inherit; }
    .issue-link:hover .issue-headline { color: #b5451b; }
    .issue-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #aaa8a4; white-space: nowrap; min-width: 76px; flex-shrink: 0; }
    .issue-headline { font-family: 'Lora', serif; font-size: 14px; font-weight: 600; color: #1a1917; line-height: 1.4; }
    .empty-state { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #888580; padding: 12px 0; }

    /* Sidebar — right */
    .sidebar { width: 160px; flex-shrink: 0; border-left: 0.5px solid rgba(26,25,23,0.1); padding: 32px 24px; }
    .sidebar-head { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #aaa8a4; margin-bottom: 14px; }
    .filter-list { list-style: none; }
    .filter-item { margin-bottom: 2px; }
    .filter-btn { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.02em; color: #4a4845; background: none; border: none; cursor: pointer; padding: 4px 0; display: block; width: 100%; text-align: left; }
    .filter-btn:hover { color: #1a1917; }
    .filter-btn.active { color: #b5451b; font-weight: 500; }
    .filter-btn.active::before { content: '— '; }

    /* Play button on issue rows */
    .issue-row { display: flex; align-items: center; border-bottom: 0.5px solid rgba(26,25,23,0.08); }
    .issue-row:first-child { border-top: 0.5px solid rgba(26,25,23,0.08); }
    .issue-item { border-bottom: none !important; }
    .issue-item:first-child { border-top: none !important; }
    .issue-link { flex: 1; border-bottom: none !important; }
    .play-btn {
      flex-shrink: 0; cursor: pointer;
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid #d4d1cc; background: none;
      color: #b8b5b0; font-size: 8px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      margin-left: 12px; transition: border-color 0.15s, color 0.15s;
    }
    .play-btn:hover { border-color: #b5451b; color: #b5451b; }
    .play-btn.playing { border-color: #b5451b; color: #b5451b; }

    /* Sticky audio bar */
    .audio-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1917; color: #fffef9;
      display: none; align-items: center; gap: 14px;
      padding: 10px 24px; z-index: 100;
      font-family: 'JetBrains Mono', monospace;
    }
    .audio-bar.visible { display: flex; }
    .audio-bar-play {
      background: none; border: none; cursor: pointer;
      color: #fffef9; font-size: 14px; flex-shrink: 0; padding: 0;
    }
    .audio-bar-title { font-size: 10px; letter-spacing: 0.06em; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.7; }
    .audio-bar-time { font-size: 10px; opacity: 0.45; white-space: nowrap; flex-shrink: 0; }
    .audio-bar-progress { flex: 1; max-width: 200px; height: 2px; background: rgba(255,255,255,0.2); border-radius: 1px; cursor: pointer; position: relative; flex-shrink: 0; }
    .audio-bar-fill { height: 100%; background: #b5451b; border-radius: 1px; width: 0%; pointer-events: none; }
    @media (max-width: 600px) { .audio-bar { padding: 10px 16px; } .audio-bar-progress { max-width: 80px; } }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="wordmark">
      <span class="wm-ai">AI</span>
      <span class="wm-brief">Brief</span>
    </div>
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="#1a1917" stroke-width="1.4"/>
        <path d="M10 10l3.5 3.5" stroke="#1a1917" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="search-input" type="text" aria-label="Search" autocomplete="off">
    </div>
  </header>

  <div class="tabs-bar">
    <div class="tabs">
      <button type="button" class="tab active" data-tab="daily">Daily</button>
      <button type="button" class="tab" data-tab="weekly">Weekly</button>
      <button type="button" class="tab" data-tab="monthly">Monthly</button>
    </div>
  </div>

  <div class="body">
    <div class="main" id="issue-container"></div>
    <aside class="sidebar">
      <ul class="filter-list" id="filter-list"></ul>
    </aside>
  </div>
</div>

<div class="audio-bar" id="audio-bar">
  <button type="button" class="audio-bar-play" id="audio-bar-play"><svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg></button>
  <span class="audio-bar-title" id="audio-bar-title"></span>
  <div class="audio-bar-progress" id="audio-bar-progress"><div class="audio-bar-fill" id="audio-bar-fill"></div></div>
  <span class="audio-bar-time" id="audio-bar-time"></span>
  <audio id="main-audio"></audio>
</div>

<script>
(function () {
  var COMPANIES = ['OpenAI','Anthropic','Google','Meta','Microsoft','Amazon','Nvidia','Apple','Mistral','ServiceNow'];
  var allIssues = [];
  var activeTab = 'daily';
  var activeTag = null;
  var searchQ = '';

  document.getElementById('search-input').addEventListener('input', function () {
    searchQ = this.value.trim().toLowerCase();
    render();
  });

  document.querySelectorAll('.tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      activeTag = null;
      buildFilters();
      render();
    });
  });

  function buildFilters() {
    var filtered = allIssues.filter(function (x) { return x.type === activeTab; });
    var tagCounts = {};
    COMPANIES.forEach(function (c) { tagCounts[c] = 0; });
    filtered.forEach(function (issue) {
      (issue.tags || []).forEach(function (t) { if (tagCounts[t] !== undefined) tagCounts[t]++; });
    });
    var list = document.getElementById('filter-list');
    list.innerHTML = '';
    COMPANIES.forEach(function (c) {
      if (tagCounts[c] === 0) return;
      var li = document.createElement('li');
      li.className = 'filter-item';
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'filter-btn' + (activeTag === c ? ' active' : '');
      btn.textContent = c;
      btn.addEventListener('click', function () {
        activeTag = (activeTag === c) ? null : c;
        buildFilters();
        render();
      });
      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  function monthLabel(dateStr) {
    var p = dateStr.split('-');
    return new Date(+p[0], +p[1] - 1, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
  }

  function render() {
    var filtered = allIssues.filter(function (x) {
      if (x.type !== activeTab) return false;
      if (activeTag && !(x.tags || []).includes(activeTag)) return false;
      if (searchQ && x.headline.toLowerCase().indexOf(searchQ) === -1) return false;
      return true;
    });

    var container = document.getElementById('issue-container');
    if (filtered.length === 0) {
      container.innerHTML = '<p class="empty-state">No issues found.</p>';
      return;
    }

    var groups = {}, groupOrder = [];
    filtered.forEach(function (issue) {
      var key = issue.date.slice(0, 7);
      if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
      groups[key].push(issue);
    });

    var html = '';
    groupOrder.forEach(function (key) {
      html += '<div class="month-group"><div class="month-label">' + monthLabel(groups[key][0].date) + '</div><ul class="issue-list">';
      groups[key].forEach(function (issue) {
        var d = activeTab === 'weekly' ? 'Week of ' + issue.date : activeTab === 'monthly' ? issue.date.slice(0, 7) : issue.date;
        var playBtn = issue.audio
          ? '<button type="button" class="play-btn" data-audio="' + issue.audio + '" data-title="' + issue.date + '" aria-label="Play podcast"><svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg></button>'
          : '';
        html += '<li class="issue-item"><div class="issue-row">' +
          '<a class="issue-link" href="' + issue.url + '">' +
          '<span class="issue-date">' + d + '</span>' +
          '<span class="issue-headline">' + issue.headline + '</span>' +
          '</a>' + playBtn + '</div></li>';
      });
      html += '</ul></div>';
    });
    container.innerHTML = html;

    document.querySelectorAll('.play-btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        playAudio(btn.dataset.audio, btn.dataset.title, btn);
      });
    });
  }

  var currentBtn = null;
  var audio = document.getElementById('main-audio');
  var bar = document.getElementById('audio-bar');

  function fmt(s) {
    s = Math.floor(s || 0);
    return Math.floor(s / 60) + ':' + ('0' + (s % 60)).slice(-2);
  }

  audio.addEventListener('timeupdate', function () {
    if (!audio.duration) return;
    document.getElementById('audio-bar-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    document.getElementById('audio-bar-time').textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
  });
  var svgPlay = '<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg>';
  var svgPause = '<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect x="1.5" y="1" width="3" height="8"/><rect x="5.5" y="1" width="3" height="8"/></svg>';

  audio.addEventListener('ended', function () {
    document.getElementById('audio-bar-play').innerHTML = svgPlay;
    if (currentBtn) { currentBtn.innerHTML = svgPlay; currentBtn.classList.remove('playing'); }
  });
  document.getElementById('audio-bar-play').addEventListener('click', function () {
    if (audio.paused) { audio.play(); this.innerHTML = svgPause; }
    else { audio.pause(); this.innerHTML = svgPlay; }
  });
  document.getElementById('audio-bar-progress').addEventListener('click', function (e) {
    if (!audio.duration) return;
    audio.currentTime = (e.offsetX / this.offsetWidth) * audio.duration;
  });

  function playAudio(src, title, btn) {
    if (currentBtn && currentBtn !== btn) { currentBtn.innerHTML = svgPlay; currentBtn.classList.remove('playing'); }
    if (audio.src.endsWith(src) && !audio.paused) {
      audio.pause();
      btn.textContent = '▶'; btn.classList.remove('playing');
      document.getElementById('audio-bar-play').textContent = '▶';
      return;
    }
    audio.src = src;
    audio.play();
    btn.innerHTML = svgPause; btn.classList.add('playing');
    document.getElementById('audio-bar-play').innerHTML = svgPause;
    document.getElementById('audio-bar-title').textContent = 'AI Brief · ' + title;
    bar.classList.add('visible');
    currentBtn = btn;
  }

  fetch('index.json').then(function (r) { return r.json(); }).then(function (data) {
    allIssues = data.issues || [];
    buildFilters();
    render();
  }).catch(function () {
    document.getElementById('issue-container').innerHTML = '<p class="empty-state">Could not load issues.</p>';
  });
})();
</script>
</body>
</html>
