<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai">
  <title>AI Brief — Configure</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f4f0; }
    .card { background: #fff; padding: 32px 40px; border-radius: 8px; text-align: center; max-width: 360px; }
    h2 { font-size: 20px; margin: 0 0 8px; color: #1a1917; }
    p { font-size: 13px; color: #666; margin: 0; }
  </style>
</head>
<body>
<div class="card">
  <h2>AI Brief</h2>
  <p>Daily AI intelligence briefing. Click Save to add this tab.</p>
</div>
<script>
  microsoftTeams.app.initialize().then(() => {
    microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
      microsoftTeams.pages.config.setConfig({
        suggestedDisplayName: "AI Brief",
        contentUrl: "https://sjvadrevu.github.io/ai-brief/",
        websiteUrl: "https://sjvadrevu.github.io/ai-brief/",
      });
      saveEvent.notifySuccess();
    });
    microsoftTeams.pages.config.setValidityState(true);
  });
</script>
</body>
</html>
